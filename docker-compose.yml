# Production Docker Compose for sammo-ts
# TypeScript-only stack (NestJS API + Next.js Web + Turn Engine)
# Equivalent to legacy: https://storage.hided.net/gitea/devsam/docker

version: "3.8"

services:
  # ===========================================
  # DATABASE SERVICES
  # ===========================================

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: sammo-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sammo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-sammo}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - sammo-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sammo} -d ${POSTGRES_DB:-sammo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for API <-> Engine Communication
  redis:
    image: redis:7-alpine
    container_name: sammo-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - sammo-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # APPLICATION SERVICES
  # ===========================================

  # NestJS API Gateway (tRPC)
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: sammo-api
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-sammo}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sammo}?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - NODE_ENV=${NODE_ENV:-production}
      - GAME_PORT=3000
      - KAKAO_REST_KEY=${KAKAO_REST_KEY:-}
      - KAKAO_ADMIN_KEY=${KAKAO_ADMIN_KEY:-}
      - KAKAO_ENABLED=${KAKAO_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sammo-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Turn Daemon (Game State Engine)
  engine:
    build:
      context: .
      dockerfile: Dockerfile
      target: engine
    container_name: sammo-engine
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-sammo}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sammo}?schema=public
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=${NODE_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - sammo-net

  # Next.js Frontend
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    container_name: sammo-web
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/trpc}
      - NODE_ENV=${NODE_ENV:-production}
    depends_on:
      - api
    networks:
      - sammo-net

  # ===========================================
  # REVERSE PROXY
  # ===========================================

  # Nginx Reverse Proxy
  nginx:
    build:
      context: .
      dockerfile: docker/production/nginx/Dockerfile
    container_name: sammo-nginx
    restart: always
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api
      - web
    networks:
      - sammo-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # MAINTENANCE SERVICES
  # ===========================================

  # Database Backup Service (Daily at 5 AM)
  backup:
    build:
      context: .
      dockerfile: docker/production/backup/Dockerfile
    container_name: sammo-backup
    restart: always
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-sammo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-sammo}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
      - TZ=${TZ:-Asia/Seoul}
    volumes:
      - backup-data:/var/backup
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sammo-net

# ===========================================
# VOLUMES
# ===========================================
volumes:
  postgres-data:
    name: sammo-postgres-data
  redis-data:
    name: sammo-redis-data
  backup-data:
    name: sammo-backup-data

# ===========================================
# NETWORKS
# ===========================================
networks:
  sammo-net:
    name: sammo-network
    driver: bridge
