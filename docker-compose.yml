version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER:-sammo}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-sammo_pass}
      - POSTGRES_DB=${DB_NAME:-sammo}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      target: api
    restart: always
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-sammo}:${DB_PASSWORD:-sammo_pass}@db:5432/${DB_NAME:-sammo}?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change_me}
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis

  engine:
    build:
      context: .
      target: engine
    restart: always
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-sammo}:${DB_PASSWORD:-sammo_pass}@db:5432/${DB_NAME:-sammo}?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis

  web:
    build:
      context: .
      target: web
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000/api
    ports:
      - "3001:3001"
    depends_on:
      - api

  db-migrate:
    build:
      context: .
    command: pnpm --filter @sammo/infra db:push
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-sammo}:${DB_PASSWORD:-sammo_pass}@db:5432/${DB_NAME:-sammo}?schema=public
    depends_on:
      - db

volumes:
  db_data:
