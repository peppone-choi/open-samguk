<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시스템 준비 중 | Open Samguk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c6a052;
            --bg: #0f1115;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #e0e0e0;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(198, 160, 82, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(198, 160, 82, 0.05) 0%, transparent 40%);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
            animation: fadeIn 1s ease-out;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(198, 160, 82, 0.2);
            border-radius: 50%;
            display: inline-block;
            position: relative;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
            margin-bottom: 2rem;
        }

        .loader::after {
            content: '';  
            box-sizing: border-box;
            position: absolute;
            left: 0;
            top: 0;
            background: var(--primary);
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0 0 1rem 0;
            font-weight: 600;
            color: #fff;
        }

        p {
            line-height: 1.6;
            margin-bottom: 2rem;
            opacity: 0.8;
            font-weight: 300;
        }

        .status-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(198, 160, 82, 0.1);
            border: 1px solid rgba(198, 160, 82, 0.2);
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--primary);
            font-weight: 600;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    <script>
        // 5초마다 자동 새로고침하여 서버가 떴는지 확인
        setTimeout(() => {
            window.location.reload();
        }, 10000);
    </script>
</head>
<body>
    <div class="container">
        <div class="logo">OPEN SAMGUK</div>
        <div><span class="loader"></span></div>
        <h1>시스템 설치 및 준비 중</h1>
        <p>
            현재 서버 소스 코드를 빌드하고 환경을 구성하고 있습니다.<br>
            첫 설치 시 약 3~5분 정도 소요될 수 있습니다.
        </p>
        <div class="status-badge">자동으로 페이지가 새로고침됩니다</div>
    </div>
</body>
</html>
