# Game-specific Nginx configuration
# URL rewriting and routing for sammo game

# Game server routes (hwe, che, kwe, etc.)
location ~ ^/(hwe|che|kwe|pwe|twe|nya|pya)/ {
    try_files $uri $uri/ /index.php?$query_string;
}

# API endpoint
location /api.php {
    try_files $uri =404;
    fastcgi_split_path_info ^(.+\.php)(/.+)$;
    fastcgi_pass php-fpm;
    fastcgi_index index.php;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_param PATH_INFO $fastcgi_path_info;
    fastcgi_read_timeout 600;
}

# OAuth routes
location /oauth_kakao/ {
    try_files $uri $uri/ /oauth_kakao/oauth.php?$query_string;
}

# Entrance (login/register)
location /i_entrance/ {
    try_files $uri $uri/ /i_entrance/entrance.php?$query_string;
}

# Image directory
location /d_pic/ {
    expires 30d;
    add_header Cache-Control "public";
}

# Security headers
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-XSS-Protection "1; mode=block" always;
